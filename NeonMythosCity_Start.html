const spriteToShadow=(data,palette,px=PX)=>{
  const rows=data.split("\n");let s=[];
  rows.forEach((row,y)=>{for(let x=0;x<row.length;x++){
    const ch=row[x];if(ch!=='.'&&palette[ch]){s.push(`${x*px}px ${y*px}px 0 ${palette[ch]}`);}
  }});return s.join(",");
};

const genResidentSprite=(hairStyle,hc,sc,bc,ac,ec)=>{
  const p={h:hc,H:ac,s:sc,e:ec||"#111",b:bc,B:ac,k:"#111"};
  const heads={short:"..hhhh..\n.hhhhhh.\n.hssssh.",long:".hhhhhh.\nhhhhhhhh\nhHsssshH",spiky:"h.hhhh.h\n.hhhhhh.\n.hssssh.",
    pony:"..hhhhh.\n.hhhhhh.\n.hssssh.",hood:"..HHHH..\n.HHHHHH.\nHHssssHH",ears:"..hh.hh.\n.hhhhhh.\n.hssssh.",
    hat:".HHHHHH.\n.Hhhhh..\n.hssssh.",bald:"........\n..ssss..\n.ssssss."};
  const head=heads[hairStyle]||heads.short;
  const face="..sesse.\n..ssss..\n...ss...";
  const bodyI=`.bbbbbb.\n.bBbbBb.\n..bbbb..\n..b..b..\n..B..B..`;
  const bodyW=`.bbbbbb.\n.bBbbBb.\n..bbbb..\n.b....b.\n.B....B.`;
  return{palette:p,idle:head+"\n"+face+"\n"+bodyI,walk:head+"\n"+face+"\n"+bodyW};
};

const buildSprites=()=>{
  const result={};
  Object.keys(SPRITE_DATA).forEach(id=>{const d=SPRITE_DATA[id];result[id]={idle:spriteToShadow(d.idle,d.palette),walk:spriteToShadow(d.walk,d.palette)};});
  Object.keys(RES_SPRITES).forEach(id=>{const[hs,hc,sc,bc,ac,ec]=RES_SPRITES[id];const d=genResidentSprite(hs,hc,sc,bc,ac,ec);
    result[id]={idle:spriteToShadow(d.idle,d.palette),walk:spriteToShadow(d.walk,d.palette)};});
  return result;
};
const ALL_SPRITES=buildSprites();

const PixelChar=({spriteId,state,isSelected,isAvatar,name,color,onClick,x,y,tick:t,tile})=>{
  const spr=ALL_SPRITES[spriteId];if(!spr)return null;
  const frame=(state==="walk"&&t%4<2)?"walk":"idle";
  return(
    <div onClick={onClick} style={{position:"absolute",
      left:x*tile+(tile-8*PX)/2,top:y*tile+(tile-11*PX)/2-2,
      width:8*PX,height:11*PX,cursor:"pointer",zIndex:20+y,
      transition:"left .15s linear,top .15s linear",
      filter:isSelected?`drop-shadow(0 0 4px ${color})`:"none"}}>
      <div style={{position:"absolute",bottom:-2,left:4,width:16,height:4,borderRadius:"50%",background:"rgba(0,0,0,.35)"}} />
      <div style={{width:PX,height:PX,boxShadow:spr[frame],position:"absolute",top:0,left:0,
        animation:state==="walk"?"pxBob .35s infinite":state==="work"?"pxWork 1s infinite":"none"}} />
      <div style={{position:"absolute",top:-10,left:"50%",transform:"translateX(-50%)",fontSize:"7px",
        color,fontWeight:"bold",whiteSpace:"nowrap",textShadow:"0 1px 3px #000,0 0 6px #000"}}>
        {isAvatar?"👤":""}{name}
      </div>
      {state==="work"&&<div style={{position:"absolute",top:-6,right:-6,fontSize:"9px",
        animation:"sparkle 1s infinite"}}>{["💰","💡","💬","⚡"][t%4]}</div>}
      {isSelected&&<div style={{position:"absolute",bottom:-4,left:2,width:20,height:6,
        borderRadius:"50%",border:`1px solid ${color}`,opacity:.6,animation:"pxBlink 1s infinite"}} />}
    </div>
  );
};

// ======= DEV TERMINAL =======
const DevTerminal=({show,onClose,gameState,setRes,setTp,log,agents,setAgents,resi,setResi,recruited,setRecruited,setDay,setTick})=>{
  const[input,setInput]=useState("");
  const[history,setHistory]=useState([{t:"sys",m:"NEON MYTHOS Dev Terminal v1.0"},{t:"sys",m:'Type "help" for commands'}]);
  const[cmdHist,setCmdHist]=useState([]);
  const[histIdx,setHistIdx]=useState(-1);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[history]);

  const out=(m,t="out")=>setHistory(p=>[...p,{t,m}]);
  const exec=(cmd)=>{
    const trimmed=cmd.trim();if(!trimmed)return;
    setCmdHist(p=>[trimmed,...p]);setHistIdx(-1);
    setHistory(p=>[...p,{t:"in",m:`> ${trimmed}`}]);
    const parts=trimmed.split(/\s+/);const c=parts[0].toLowerCase();const args=parts.slice(1);

    switch(c){
      case"help":
        out("=== COMMANDS ===","sys");
        out("  give yen <amount>     - Add yen","sys");
        out("  give data <amount>    - Add data","sys");
        out("  give con <amount>     - Add contracts","sys");
        out("  give rep <amount>     - Add reputation","sys");
        out("  set speed <1|2|3>     - Set game speed","sys");
        out("  set day <num>         - Set day number","sys");
        out("  list agents           - Show all agents","sys");
        out("  list residents        - Show residents","sys");
        out("  list buildings        - Show buildings","sys");
        out("  recruit <id>          - Force recruit","sys");
        out("  recruit all           - Recruit everyone","sys");
        out("  levelup <id> [amount] - Level up agent","sys");
        out("  levelup all [amount]  - Level up everyone","sys");
        out("  heal <id|all>         - Restore mood","sys");
        out("  tp <id> <x> <y>       - Teleport agent","sys");
        out("  spawn event           - Trigger random event","sys");
        out("  reset                 - Reset resources","sys");
        out("  status                - Show game state","sys");
        out("  clear                 - Clear terminal","sys");
        break;
      case"give":{
        const key=args[0];const amt=parseInt(args[1])||0;
        if(key==="yen"){setRes(r=>({...r,yen:Math.max(0,r.yen+amt)}));if(amt>0)setTp(p=>p+amt);out(`+${amt} yen`);}
        else if(key==="data"){setRes(r=>({...r,data:Math.max(0,r.data+amt)}));out(`+${amt} data`);}
        else if(key==="con"){setRes(r=>({...r,con:Math.max(0,r.con+amt)}));out(`+${amt} contracts`);}
        else if(key==="rep"){setRes(r=>({...r,rep:Math.max(0,Math.min(100,r.rep+amt))}));out(`+${amt} reputation`);}
        else out("Unknown resource. Use: yen, data, con, rep","err");
        break;}
      case"set":
        if(args[0]==="day"){const d=parseInt(args[1])||1;setDay(d);out(`Day set to ${d}`);}
        else out("Unknown setting","err");
        break;
      case"list":
        if(args[0]==="agents"){agents.forEach(a=>out(`  ${a.id} [${a.jp}] Lv${a.level} mood:${Math.round(a.mood)} earn:¥${a.earn} state:${a.state}`));}
        else if(args[0]==="residents"||args[0]==="resi"){
          if(resi.length===0)out("No residents recruited yet");
          else resi.forEach(r=>out(`  ${r.id} [${r.jp}] Lv${r.level} mood:${Math.round(r.mood)} earn:¥${r.earn}`));}
        else if(args[0]==="buildings"){BUILDINGS.forEach(b=>out(`  ${b.id} [${b.name}] cat:${b.cat} @(${b.x},${b.y})`));}
        else out("list agents | residents | buildings","err");
        break;
      case"recruit":{
        if(args[0]==="all"){
          let count=0;
          RES_POOL.forEach(r=>{
            if(!recruited.find(x=>x.id===r.id)){
              setRecruited(p=>[...p,r]);
              setResi(p=>[...p,{...r,x:Math.floor(Math.random()*MAP_W),y:[5,9,14][Math.floor(Math.random()*3)],tx:null,ty:null,state:"idle",timer:5,mood:80,exp:0,level:1,earn:0}]);
              count++;
            }
          });
          out(`Recruited ${count} residents (free)`);log("DEV","全員無料雇用！","#FF44AA");
        } else {
          const rid=args[0];const r=RES_POOL.find(x=>x.id===rid);
          if(!r){out(`Unknown resident: ${rid}`,"err");break;}
          if(recruited.find(x=>x.id===rid)){out(`${rid} already recruited`,"err");break;}
          setRecruited(p=>[...p,r]);
          setResi(p=>[...p,{...r,x:Math.floor(Math.random()*MAP_W),y:[5,9,14][Math.floor(Math.random()*3)],tx:null,ty:null,state:"idle",timer:5,mood:80,exp:0,level:1,earn:0}]);
          out(`Recruited ${r.jp} (free)`);log("DEV",`${r.jp}を無料雇用！`,"#FF44AA");
        }
        break;}
      case"levelup":{
        const amt=parseInt(args[1])||1;
        if(args[0]==="all"){
          setAgents(p=>p.map(a=>({...a,level:a.level+amt,exp:0})));
          setResi(p=>p.map(a=>({...a,level:a.level+amt,exp:0})));
          out(`All agents leveled up +${amt}`);
        } else {
          const id=args[0];
          let found=false;
          setAgents(p=>p.map(a=>{if(a.id===id){found=true;return{...a,level:a.level+amt,exp:0};}return a;}));
          setResi(p=>p.map(a=>{if(a.id===id){found=true;return{...a,level:a.level+amt,exp:0};}return a;}));
          out(found?`${id} leveled up +${amt}`:`Agent not found: ${id}`);
        }
        break;}
      case"heal":{
        if(args[0]==="all"){
          setAgents(p=>p.map(a=>({...a,mood:100})));setResi(p=>p.map(a=>({...a,mood:100})));out("All moods restored to 100");
        } else {
          const id=args[0];let found=false;
          setAgents(p=>p.map(a=>{if(a.id===id){found=true;return{...a,mood:100};}return a;}));
          setResi(p=>p.map(a=>{if(a.id===id){found=true;return{...a,mood:100};}return a;}));
          out(found?`${id} mood restored`:`Not found: ${id}`);
        }
        break;}
      case"tp":{
        const id=args[0];const tx=parseInt(args[1]);const ty=parseInt(args[2]);
        if(isNaN(tx)||isNaN(ty)){out("Usage: tp <id> <x> <y>","err");break;}
        let found=false;
        setAgents(p=>p.map(a=>{if(a.id===id){found=true;return{...a,x:tx,y:ty,state:"idle",timer:3};}return a;}));
        setResi(p=>p.map(a=>{if(a.id===id){found=true;return{...a,x:tx,y:ty,state:"idle",timer:3};}return a;}));
        out(found?`${id} teleported to (${tx},${ty})`:`Not found: ${id}`);
        break;}
      case"spawn":
        if(args[0]==="event"){
          const ev=[{m:"💫 流れ星！¥3,000",f:()=>setRes(r=>({...r,yen:r.yen+3000}))},{m:"🐦 新規契約！",f:()=>setRes(r=>({...r,con:r.con+1}))},{m:"📡 DATA+25",f:()=>setRes(r=>({...r,data:r.data+25}))}];
          const e=ev[Math.floor(Math.random()*ev.length)];e.f();log("EVENT",e.m,"#AADDFF");out(`Event triggered: ${e.m}`);
        } else out("Usage: spawn event","err");
        break;
      case"reset":
        setRes({yen:50000,data:100,con:5,rep:60});setTp(0);out("Resources reset to defaults");break;
      case"status":
        out(`yen:¥${gameState.yen.toLocaleString()} data:${gameState.data} con:${gameState.con} rep:${gameState.rep}`);
        out(`agents:${agents.length} residents:${resi.length} total:${agents.length+resi.length}`);
        break;
      case"clear":setHistory([{t:"sys",m:"Terminal cleared"}]);break;
      default:out(`Unknown command: ${c}. Type "help"`,"err");
    }
  };

  const handleKey=(e)=>{
    if(e.key==="Enter"){exec(input);setInput("");}
    else if(e.key==="ArrowUp"){e.preventDefault();const ni=Math.min(histIdx+1,cmdHist.length-1);setHistIdx(ni);if(cmdHist[ni])setInput(cmdHist[ni]);}
    else if(e.key==="ArrowDown"){e.preventDefault();const ni=histIdx-1;setHistIdx(ni);setInput(ni>=0?cmdHist[ni]:"");}
  };

  if(!show)return null;
  return(
    <div style={{position:"fixed",inset:0,zIndex:2000,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,.6)",padding:"0 0 env(safe-area-inset-bottom) 0"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:"100%",maxWidth:"600px",maxHeight:"70vh",background:"#0a0c12",border:"1px solid #00FF8844",borderRadius:"12px 12px 0 0",
        display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 -4px 30px rgba(0,255,136,.15)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"#0d1018",borderBottom:"1px solid #1a2a1e"}}>
          <span style={{fontSize:"11px",fontWeight:"bold",color:"#00FF88",fontFamily:"monospace"}}>$ NEON DEV TERMINAL</span>
          <button onClick={onClose} style={{background:"none",border:"1px solid #333",color:"#666",fontSize:"10px",padding:"2px 8px",borderRadius:"4px",cursor:"pointer"}}>ESC</button>
        </div>
        <div style={{flex:1,overflow:"auto",padding:"8px 12px",fontFamily:"'Courier New',monospace",fontSize:"11px",lineHeight:"1.5",WebkitOverflowScrolling:"touch"}}>
          {history.map((h,i)=>(
            <div key={i} style={{color:h.t==="sys"?"#00FF88":h.t==="err"?"#FF4444":h.t==="in"?"#888":"#ccc",
              whiteSpace:"pre-wrap",wordBreak:"break-all"}}>{h.m}</div>
          ))}
          <div ref={endRef}/>
        </div>
        <div style={{display:"flex",alignItems:"center",padding:"6px 12px",borderTop:"1px solid #1a2a1e",background:"#0d1018",gap:"6px"}}>
          <span style={{color:"#00FF88",fontSize:"12px",fontFamily:"monospace"}}>$</span>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey}
            autoFocus placeholder="type command..."
            style={{flex:1,background:"transparent",border:"none",outline:"none",color:"#eee",fontSize:"13px",
              fontFamily:"'Courier New',monospace",padding:"6px 0",caretColor:"#00FF88"}} />
        </div>
      </div>
    </div>
  );
};

// ======= MAIN GAME =======
function NeonMythosCity(){
  const isMobile=useIsMobile();
  const TILE=isMobile?16:30;
  const[tick,setTick]=useState(0);
  const[day,setDay]=useState(1);
  const[speed,setSpeed]=useState(1);
  const[paused,setPaused]=useState(false);
  const[res,setRes]=useState({yen:50000,data:100,con:5,rep:60});
  const[tp,setTp]=useState(0);
  const[phase,setPhase]=useState("morning");
  const[avatar,setAvatar]=useState(null);
  const[showAvSel,setShowAvSel]=useState(true);
  const[recruited,setRecruited]=useState([]);
  const[showRecruit,setShowRecruit]=useState(false);
  const[rTab,setRTab]=useState("gym");
  const[agents,setAgents]=useState(()=>AGENTS.map(c=>({...c,x:c.bx,y:c.by+2,tx:null,ty:null,state:"idle",timer:0,mood:80,exp:0,level:1,earn:0})));
  const[resi,setResi]=useState([]);
  const[logs,setLogs]=useState([{ch:"SYSTEM",msg:"アバターを選んでください",col:"#00E5FF"}]);
  const[sel,setSel]=useState(null);
  const[hovB,setHovB]=useState(null);
  const[qte,setQte]=useState(null);
  const[qteTm,setQteTm]=useState(0);
  const[qteRes,setQteRes]=useState(null);
  const[qteSt,setQteSt]=useState({ok:0,ng:0});
  const[showTerm,setShowTerm]=useState(false);
  const[mobileTab,setMobileTab]=useState("map"); // map | info | feed
  const lastQ=useRef(Date.now());
  const tRef=useRef(tick);tRef.current=tick;

  const log=useCallback((ch,msg,col)=>{setLogs(p=>[{ch,msg,col},...p].slice(0,80));},[]);
  const all=[...agents,...resi];

  const pickAvatar=r=>{setAvatar(r);setShowAvSel(false);log("SYSTEM",`${r.jp}でゲーム開始！`,r.color);};
  const recruit=r=>{
    if(recruited.find(x=>x.id===r.id))return;
    const cost=r.tier==="champ"?8000:r.tier==="e4"?5000:r.tier==="gym"?3000:2000;
    if(res.yen<cost){log("SYSTEM","資金不足！","#FF4444");return;}
    setRes(p=>({...p,yen:p.yen-cost}));setRecruited(p=>[...p,r]);
    setResi(p=>[...p,{...r,x:Math.floor(Math.random()*MAP_W),y:[5,9,14][Math.floor(Math.random()*3)],tx:null,ty:null,state:"idle",timer:5,mood:80,exp:0,level:1,earn:0}]);
    log("🎉雇用",`${r.jp}（${r.title}）が来た！`,r.color);
  };

  // ESC to toggle terminal
  useEffect(()=>{const h=e=>{if(e.key==="Escape")setShowTerm(p=>!p);};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[]);

  // QTE
  useEffect(()=>{if(paused||qte)return;const iv=setInterval(()=>{if(Date.now()-lastQ.current>=QTE_MS){
    const e=QTES[Math.floor(Math.random()*QTES.length)];setQte(e);setQteTm(e.tl);lastQ.current=Date.now();log("⚠️QTE",e.title,e.color);
  }},1000);return()=>clearInterval(iv);},[paused,qte,log]);
  useEffect(()=>{if(!qte)return;const iv=setInterval(()=>{setQteTm(p=>{if(p<=100){doQ(false);return 0;}return p-100;});},100);return()=>clearInterval(iv);},[qte]);
  const doQ=useCallback(ok=>{if(!qte)return;const fx=ok?qte.rw:qte.pn;
    setRes(r=>{const n={...r};if(fx.yen)n.yen=Math.max(0,n.yen+fx.yen);if(fx.data)n.data=Math.max(0,n.data+fx.data);if(fx.con)n.con=Math.max(0,n.con+(fx.con||0));if(fx.rep)n.rep=Math.max(0,Math.min(100,n.rep+fx.rep));return n;});
    if(ok&&(qte.rw.yen||0)>0)setTp(p=>p+(qte.rw.yen||0));
    setQteSt(p=>ok?{...p,ok:p.ok+1}:{...p,ng:p.ng+1});
    log(ok?"✅":"❌",ok?qte.ok:qte.ng,ok?"#00FF88":"#FF4444");
    setQteRes({ok,msg:ok?qte.ok:qte.ng});setQte(null);setTimeout(()=>setQteRes(null),2500);
  },[qte,log]);
  useEffect(()=>{const h=e=>{if(showTerm)return;if(qte&&e.key.toUpperCase()===qte.key){e.preventDefault();doQ(true);}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[qte,doQ,showTerm]);

  // Game tick
  useEffect(()=>{if(paused||showAvSel)return;const iv=setInterval(()=>{setTick(t=>{const n=t+1,d=n%DAY_TICKS;
    if(d===0)setDay(v=>v+1);setPhase(d<87?"morning":d<175?"noon":d<262?"evening":"night");return n;});},TICK_MS/speed);return()=>clearInterval(iv);},[paused,speed,showAvSel]);

  // Character AI
  const runAI=(setter)=>{setter(prev=>prev.map(ch=>{
    let c={...ch};
    if(c.state==="idle"){c.timer--;if(c.timer<=0){const r=Math.random();let tb;
      if(r<.55){const pid=c.pref[Math.floor(Math.random()*c.pref.length)];tb=BUILDINGS.find(b=>b.id===pid);}
      else if(r<.85)tb=BUILDINGS[Math.floor(Math.random()*BUILDINGS.length)];
      else{c.tx=Math.max(0,Math.min(MAP_W-1,c.x+Math.floor(Math.random()*9)-4));c.ty=Math.max(0,Math.min(MAP_H-1,c.y+Math.floor(Math.random()*7)-3));c.state="walk";return c;}
      if(tb){c.tx=tb.x+Math.floor(Math.random()*tb.w);c.ty=tb.y+tb.h;c.state="walk";}
    }return c;}
    if(c.state==="walk"){
      if(c.tx===null||(c.x===c.tx&&c.y===c.ty)){c.state="work";c.timer=15+Math.floor(Math.random()*25);
        const bl=getBld(c.x,c.y-1)||getBld(c.x,c.y);
        if(bl&&c.act&&c.act[bl.id]){const ms=c.act[bl.id];log(c.jp,ms[Math.floor(Math.random()*ms.length)],c.color);
          const gv=c.p.g||0;const pr=Math.floor(Math.random()*800*gv+30);

        {!isMobile&&<span style={{color:"#FF69B4"}}>📜{res.con}</span>}
        <span style={{color:"#00FF88"}}>⭐{res.rep}</span>
      </div>
    </div>

    {/* Controls */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:isMobile?"4px 8px":"3px 10px",background:"#0a0c1a",borderBottom:"1px solid #12122e",fontSize:"9px",flexShrink:0,gap:"4px",overflowX:"auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:"4px",flexShrink:0}}>
        <span style={{color:phase==="night"?"#66b":phase==="evening"?"#b85":"#7b9"}}>{phase==="morning"?"🌅":phase==="noon"?"☀️":phase==="evening"?"🌇":"🌙"}</span>
        <span style={{color:"#777",fontSize:"9px"}}>D{day}</span>
        <div style={{width:"30px",height:"3px",background:"#1a1a2e",borderRadius:"2px",overflow:"hidden"}}><div style={{height:"100%",width:`${dp*100}%`,background:"linear-gradient(90deg,#48F,#FD0)",borderRadius:"2px"}} /></div>
      </div>
      <div style={{display:"flex",gap:"3px",flexShrink:0}}>
        <button onClick={()=>setPaused(!paused)} style={{background:paused?"#320":"#151520",border:"1px solid #333",color:paused?"#FD0":"#777",padding:isMobile?"4px 8px":"2px 6px",borderRadius:"3px",cursor:"pointer",fontSize:"9px"}}>{paused?"▶":"⏸"}</button>
        {[1,2,3].map(s=>(<button key={s} onClick={()=>setSpeed(s)} style={{background:speed===s?"#0f20f":"#151520",border:`1px solid ${speed===s?"#0F8":"#333"}`,color:speed===s?"#0F8":"#555",padding:isMobile?"4px 6px":"2px 5px",borderRadius:"3px",cursor:"pointer",fontSize:"9px"}}>×{s}</button>))}
        <button onClick={()=>setShowRecruit(true)} style={{background:"#1a1520",border:"1px solid #FF69B488",color:"#FF69B4",padding:isMobile?"4px 8px":"2px 6px",borderRadius:"3px",cursor:"pointer",fontSize:"9px"}}>🏰</button>
        <button onClick={()=>{if(!qte){const e=QTES[Math.floor(Math.random()*QTES.length)];setQte(e);setQteTm(e.tl);lastQ.current=Date.now();}}} style={{background:"#200",border:"1px solid #FF444466",color:"#F64",padding:isMobile?"4px 6px":"2px 5px",borderRadius:"3px",cursor:"pointer",fontSize:"9px"}}>⚡</button>
        <button onClick={()=>setShowTerm(true)} style={{background:"#001a0a",border:"1px solid #00FF8844",color:"#00FF88",padding:isMobile?"4px 8px":"2px 6px",borderRadius:"3px",cursor:"pointer",fontSize:"9px",fontFamily:"monospace"}}>$_</button>
      </div>
    </div>

    {/* MAIN CONTENT */}
    {isMobile?(
      // ===== MOBILE LAYOUT =====
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Mobile Tab Bar */}
        <div style={{display:"flex",borderBottom:"1px solid #1a1a3e",flexShrink:0}}>
          {[{k:"map",l:"🗺 MAP"},{k:"info",l:"📊 INFO"},{k:"feed",l:"📜 FEED"}].map(t=>(
            <button key={t.k} onClick={()=>setMobileTab(t.k)} style={{flex:1,padding:"8px",background:mobileTab===t.k?"#0c0f1f":"#08091a",border:"none",borderBottom:mobileTab===t.k?"2px solid #00E5FF":"2px solid transparent",color:mobileTab===t.k?"#00E5FF":"#555",fontSize:"10px",fontWeight:"bold",cursor:"pointer",fontFamily:"inherit"}}>{t.l}</button>
          ))}
        </div>
        <div style={{flex:1,overflow:"auto",padding:"4px",WebkitOverflowScrolling:"touch"}}>
          {mobileTab==="map"&&<div style={{overflow:"auto",WebkitOverflowScrolling:"touch"}}><GameMap/></div>}
          {mobileTab==="info"&&<InfoPanel/>}
          {mobileTab==="feed"&&<FeedPanel/>}
        </div>
      </div>
    ):(
      // ===== DESKTOP LAYOUT =====
      <div style={{display:"flex",flexWrap:"wrap",flex:1,overflow:"auto"}}>
        <div style={{padding:"4px"}}><GameMap/></div>
        <div style={{flex:1,minWidth:"230px",maxWidth:"310px",display:"flex",flexDirection:"column",gap:"4px",padding:"4px 4px 4px 0"}}>
          <InfoPanel/>
          <FeedPanel/>
        </div>
      </div>
    )}

    {/* Footer */}
    <div style={{display:"flex",justifyContent:"space-between",padding:isMobile?"4px 8px":"3px 10px",borderTop:"1px solid #1a1a3e",background:"#0a0c1a",fontSize:"8px",color:"#444",flexShrink:0,paddingBottom:isMobile?"calc(4px + env(safe-area-inset-bottom))":"3px"}}>
      <span>⚔ NEON CITY / D{day} / 住人:{all.length}</span>
      <span style={{animation:"blink 2s infinite"}}>● ONLINE</span>
    </div>
  </div>);
}


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NeonMythosCity />);
    </script>
</body>
</html>
